    runs-on: ubuntu-latest
    needs:
    - package_linux_x86_64
    - package_linux_aarch64
    - package_windows_x86_64
    - package_windows_aarch64
    - package_macos_x86_64_dmg
    - package_macos_x86_64_binary
    - package_macos_aarch64_dmg
    - package_macos_aarch64_binary
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: binaries-*
        path: artifacts
        merge-multiple: true
    - name: List Artifacts (Verify)
      run: ls -R artifacts
    - name: Update Nightly Release
      uses: softprops/action-gh-release@v3
      with:
        name: Latest Build (Nightly)
        tag_name: latest
        prerelease: true
        files: artifacts/**/*
